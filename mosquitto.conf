# Mosquitto MQTT Broker Configuration
# Allow anonymous connections (for testing)
allow_anonymous true

# MQTT listener on port 1884 (1883 is reserved by Railway TCP proxy)
listener 1884 0.0.0.0
# Internal loopback listener for Railway-internal publisher (avoids Railway TCP proxy on 1884)
listener 1885 127.0.0.1

# WebSocket listener on port 9001
listener 9001 0.0.0.0
protocol websockets

# Logging
log_type all
